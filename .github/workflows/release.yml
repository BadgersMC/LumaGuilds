name: release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ROSECHAT_PREHOOK_REF: 3fe078a

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags for version bump

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Bump version
        id: bump
        run: |
          # Find latest tag matching v*.*.*
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            # No tags yet — read base from build.gradle.kts
            BASE=$(grep -oP 'version\s*=\s*findProperty.*\?\s*:\s*"\K[^"]+' build.gradle.kts)
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
          else
            # Strip leading 'v'
            VER="${LATEST#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
          fi
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest tag: ${LATEST:-none}, bumping to v$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Cache RoseChat jar
        id: rosechat-cache
        uses: actions/cache@v4
        with:
          path: libs/RoseChat-RC-2.jar
          key: rosechat-jar-prehook-${{ env.ROSECHAT_PREHOOK_REF }}

      - name: Build RoseChat (pre-hook) dependency
        if: steps.rosechat-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/BadgersMC/Enthusia-RoseChat.git "$RUNNER_TEMP/rosechat"
          cd "$RUNNER_TEMP/rosechat"
          git checkout "$ROSECHAT_PREHOOK_REF"
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
          ROSE_JAR=$(ls build/libs/RoseChat-RC-2*.jar | grep -v '\-sources\|\-javadoc' | head -1)
          mkdir -p "$GITHUB_WORKSPACE/libs"
          cp "$ROSE_JAR" "$GITHUB_WORKSPACE/libs/RoseChat-RC-2.jar"

      - name: Build shadowJar
        run: ./gradlew shadowJar --no-daemon -PreleaseVersion=${{ steps.bump.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: LumaGuilds v${{ steps.bump.outputs.version }}
          files: build/libs/LumaGuilds-${{ steps.bump.outputs.version }}.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
