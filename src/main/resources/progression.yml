# LumaGuilds Progression Configuration
# Max level: 100
# XP formula: base_xp * (level - 1)^level_exponent + (level * linear_bonus)

enabled: true
claims_based: true
max_level: 100

leveling:
  base_xp: 500.0
  level_exponent: 1.15
  linear_bonus: 150

rate_limiting:
  xp_cooldown_ms: 5000
  max_xp_per_batch: 50

experience_sources:
  guild:
    bank_deposit:
      enabled: true
      xp_per_100_coins: 1
    member_joined:
      enabled: true
      xp: 50
    war_won:
      enabled: true
      xp: 500
    war_lost:
      enabled: true
      xp: 100
    claim_created:
      enabled: true
      xp: 100
    alliance_formed:
      enabled: true
      xp: 200
    party_created:
      enabled: true
      xp: 25
  player:
    player_kill:
      enabled: true
      xp: 50
    mob_kill:
      enabled: true
      xp: 5
    crop_harvest:
      enabled: true
      xp: 3
    block_break:
      enabled: true
      xp: 1
    block_place:
      enabled: true
      xp: 1
    crafting:
      enabled: true
      xp: 2
    smelting:
      enabled: true
      xp: 2
    brewing:
      enabled: true
      xp: 5
    fishing:
      enabled: true
      xp: 10
    enchanting:
      enabled: true
      xp: 15

